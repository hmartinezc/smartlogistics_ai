services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3001:3001'
    environment:
      PORT: '3001'
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      TURSO_DATABASE_URL: file:./data/smart-invoice.db
      MINIO_ENDPOINT: minio
      MINIO_PORT: '9000'
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-smartlogistics_minio}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-smartlogistics_minio_internal_only}
      MINIO_BUCKET: smart-invoices
      MINIO_USE_SSL: 'false'
      DOCUMENT_WORKER_ENABLED: ${DOCUMENT_WORKER_ENABLED:-true}
      DOCUMENT_WORKER_CONCURRENCY: ${DOCUMENT_WORKER_CONCURRENCY:-5}
      DOCUMENT_WORKER_POLL_MS: ${DOCUMENT_WORKER_POLL_MS:-5000}
      DOCUMENT_WORKER_STALE_PROCESSING_MS: ${DOCUMENT_WORKER_STALE_PROCESSING_MS:-1800000}
    volumes:
      - app_data:/app/data
    depends_on:
      - minio
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--no-verbose',
          '--tries=1',
          '--spider',
          'http://localhost:3001/api/health',
        ]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-smartlogistics_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-smartlogistics_minio_internal_only}
    expose:
      - '9000'
      - '9001'
    volumes:
      - minio_data:/data
    restart: unless-stopped

volumes:
  app_data:
  minio_data:
