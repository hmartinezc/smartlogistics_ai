services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3001:3001'
    environment:
      PORT: '3001'
      TURSO_DATABASE_URL: ${TURSO_DATABASE_URL:-file:./data/app.db}
      TURSO_AUTH_TOKEN: ${TURSO_AUTH_TOKEN:-}
      MINIO_ENDPOINT: minio
      MINIO_PORT: '9000'
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET:-app-files}
      MINIO_USE_SSL: 'false'
      WORKER_ENABLED: ${WORKER_ENABLED:-true}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-5}
      WORKER_POLL_MS: ${WORKER_POLL_MS:-7000}
      WORKER_JOB_TIMEOUT_MS: ${WORKER_JOB_TIMEOUT_MS:-300000}
      WORKER_STALE_PROCESSING_MS: ${WORKER_STALE_PROCESSING_MS:-2100000}
    volumes:
      - app_data:/app/data
    depends_on:
      - minio
    healthcheck:
      test:
        ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:3001/api/ready']
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    restart: unless-stopped

  minio:
    image: minio/minio:REPLACE_WITH_PINNED_TAG
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    expose:
      - '9000'
      - '9001'
    volumes:
      - minio_data:/data
    restart: unless-stopped

volumes:
  app_data:
  minio_data:
